name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.13

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runs-on: macos-14
            triple: aarch64-apple-darwin
            bundles: app
            bundlePaths: tauri/target/release/bundle/macos/*.app.zip
          - platform: macos-x64
            runs-on: macos-13
            triple: x86_64-apple-darwin
            bundles: app
            bundlePaths: tauri/target/release/bundle/macos/*.app.zip
          - platform: linux-x64
            runs-on: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            bundlePaths: |
              tauri/target/release/bundle/appimage/*.AppImage
              tauri/target/release/bundle/deb/*.deb
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target
      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf
      - run: bun install --frozen-lockfile
      - run: bun tauri build --ci --bundles ${{ matrix.bundles }}
      - name: Zip macOS .app
        if: runner.os == 'macOS'
        working-directory: tauri/target/release/bundle/macos
        run: |
          set -euo pipefail
          app=$(ls -d *.app | head -n1)
          out="${app%.app}-${{ matrix.triple }}.app.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app" "$out"
          ls -lh "$out"
      - name: Upload bundles to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          PATHS: ${{ matrix.bundlePaths }}
        run: |
          set -euo pipefail
          files=()
          for pattern in $PATHS; do
            for f in $pattern; do
              [ -e "$f" ] && files+=("$f")
            done
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "no bundle files matched for $PATHS" >&2
            exit 1
          fi
          printf '▸ uploading: %s\n' "${files[@]}"
          gh release upload "$TAG" "${files[@]}" --clobber
