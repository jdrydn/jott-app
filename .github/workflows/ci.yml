name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  BUN_VERSION: 1.3.13

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun test

  build:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - bun-darwin-arm64
          - bun-darwin-x64
          - bun-linux-x64
          - bun-linux-arm64
          - bun-windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build binary for ${{ matrix.target }}
        run: bun scripts/build.ts --target ${{ matrix.target }} --outfile jottapp-${{ matrix.target }}
      - name: Smoke-test native binary
        if: matrix.target == 'bun-linux-x64'
        run: |
          chmod +x ./jottapp-${{ matrix.target }}
          ./jottapp-${{ matrix.target }} --version
          ./jottapp-${{ matrix.target }} --help
      - uses: actions/upload-artifact@v4
        with:
          name: jottapp-${{ matrix.target }}
          path: jottapp-${{ matrix.target }}*
          if-no-files-found: error
          retention-days: 14

  tauri:
    name: Tauri build (${{ matrix.platform }})
    needs: ci
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runs-on: macos-14
          - platform: linux-x64
            runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target
      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libwebkit2gtk-4.1-0 \
            libjavascriptcoregtk-4.1-dev \
            libjavascriptcoregtk-4.1-0 \
            gir1.2-webkit2-4.1 \
            gir1.2-javascriptcoregtk-4.1 \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libfuse2t64 \
            patchelf
      - run: bun install --frozen-lockfile
      - name: Build Tauri app
        env:
          # linuxdeploy ships as an AppImage and needs FUSE to mount itself.
          # GitHub runners can refuse FUSE mounts even with libfuse2 installed
          # (sandbox/permission), so make AppImages extract instead.
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: bun tauri build --ci
