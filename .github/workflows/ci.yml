name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  BUN_VERSION: 1.3.13

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun test

  build:
    name: Build (${{ matrix.target }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - bun-darwin-arm64
          - bun-darwin-x64
          - bun-linux-x64
          - bun-linux-arm64
          - bun-windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build binary for ${{ matrix.target }}
        run: bun scripts/build.ts --target ${{ matrix.target }} --outfile jottapp-${{ matrix.target }}
      - name: Smoke-test native binary
        if: matrix.target == 'bun-linux-x64'
        run: |
          chmod +x ./jottapp-${{ matrix.target }}
          ./jottapp-${{ matrix.target }} --version
          ./jottapp-${{ matrix.target }} --help
      - uses: actions/upload-artifact@v4
        with:
          name: jottapp-${{ matrix.target }}
          path: jottapp-${{ matrix.target }}*
          if-no-files-found: error
          retention-days: 14
